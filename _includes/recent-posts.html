{% assign recent_posts = site.posts | slice: 0, 5 %}
{% for post in recent_posts %}
<li class="flex items-start space-x-2 md:space-x-3 select-none hover:translate-x-1 transition-transform">
  <!-- star doodle bullet -->
  <svg class="doodle flex-shrink-0 mt-0.5" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
       stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
  </svg>
  <a
    href="{{ post.url | absolute_url }}"
    class="text-black underline hover:text-gray-700 focus:outline-none text-sm md:text-base leading-tight flex-1"
  >
    {{ post.title }}
  </a>
</li>
{% endfor %}
