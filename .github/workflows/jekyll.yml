name: Build and deploy Jekyll site

# Builds the site with Jekyll 4 (the github-pages gem is stuck on Jekyll 3.10,
# which is why the default Pages builder fails on this repo). Publishes the
# built site to GitHub Pages on every push to main.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'

      - name: Add Linux platform to Gemfile.lock
        # The committed lockfile only has x64-mingw-ucrt (Windows). Adding the
        # Linux platform here lets bundler resolve gems on the runner without
        # rewriting the lockfile in the repo.
        run: bundle lock --add-platform x86_64-linux

      - name: Install dependencies
        run: bundle install --jobs 4 --retry 3

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build site
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
