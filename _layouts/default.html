<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <meta name="theme-color" content="#fdfbf7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="{{ '/styles.css' | absolute_url }}">
  {% seo %}
  {% feed_meta %}
</head>
<body class="bg-grid-pattern p-4 md:p-8 min-h-screen flex flex-col items-center">
  <header class="mb-6">
    <div
      class="px-4 md:px-8 py-3 text-center text-xl md:text-2xl select-none"
      style="width: 260px"
    >
      <a href="{{ '/' | absolute_url }}" class="text-current no-underline inline-flex items-center gap-2 justify-center">
        <!-- 4-point sparkle doodle -->
        <svg class="doodle" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 2L14 9L21 10L15 14L17 21L12 17L7 21L9 14L3 10L10 9Z"/>
        </svg>
        <span class="marker">HAWATRI LOGS<span class="marker-line marker-line-yellow" aria-hidden="true"></span></span>
      </a>
    </div>
  </header>

  <nav
    class="relative flex items-center px-3 md:px-6 py-3 w-full max-w-[1400px]"
    style="min-height: 56px"
  >
    <ul class="flex flex-wrap items-center gap-1 md:gap-2 text-lg md:text-xl select-none">
      <li>
        <a
          href="{{ '/' | absolute_url }}"
          class="focus:outline-none hover:bg-gray-100 rounded px-2 md:px-3 py-1 {% if page.url == '/' %}nav-active px-3 md:px-4{% endif %}"
          aria-label="Home"
        >
          HOME
        </a>
      </li>
      <li class="text-gray-400" aria-hidden="true">·</li>
      <li>
        <a
          href="{{ '/blog/' | absolute_url }}"
          class="focus:outline-none hover:bg-gray-100 rounded px-2 md:px-3 py-1 {% if page.url == '/blog/' or page.layout == 'blog' %}nav-active px-3 md:px-4{% endif %}"
          aria-label="Contents"
        >
          CONTENTS
        </a>
      </li>
      <li class="text-gray-400" aria-hidden="true">·</li>
      <li>
        <a
          href="{{ '/settings/' | absolute_url }}"
          class="focus:outline-none hover:bg-gray-100 rounded px-2 md:px-3 py-1 {% if page.url contains '/settings/' %}nav-active px-3 md:px-4{% endif %}"
          aria-label="Settings"
        >
          SETTINGS
        </a>
      </li>
      <li class="text-gray-400" aria-hidden="true">·</li>
      <li>
        <a
          href="{{ '/about/' | absolute_url }}"
          class="focus:outline-none hover:bg-gray-100 rounded px-2 md:px-3 py-1 {% if page.url contains '/about/' %}nav-active px-3 md:px-4{% endif %}"
          aria-label="About"
        >
          ABOUT
        </a>
      </li>
    </ul>
    <div
      class="ml-auto relative w-full md:w-auto"
      style="min-width: 180px; max-width: 280px;"
    >
      <form
        class="flex overflow-hidden w-full"
        style="min-height: 40px"
        onsubmit="event.preventDefault();"
        role="search"
      >
        <div class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-500 pointer-events-none">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
          </svg>
        </div>
        <input
          type="search"
          id="searchInput"
          aria-label="Search"
          class="outline-none pl-10 pr-3 text-sm md:text-base font-normal text-black w-full bg-transparent"
          placeholder="Search posts..."
          autocomplete="off"
        />
      </form>
      <div id="searchResults" class="hidden"></div>
    </div>
  </nav>

  <main
    class="flex flex-col md:flex-row mt-6 w-full max-w-[1400px] mx-auto space-y-4 md:space-y-0 md:space-x-6 flex-grow"
    style="font-size: 18px; line-height: 1.4"
  >
    <aside
      class="p-4 md:p-6 w-full md:w-[280px] flex-shrink-0 order-2 md:order-1"
      style="min-height: 600px"
    >
      <h2 class="text-xl md:text-2xl mb-4 select-none">
        <span class="marker">RECENT CONTENTS<span class="marker-line marker-line-pink" aria-hidden="true"></span></span>
      </h2>
      <ul id="recentBlogsList" class="space-y-3">
        {% include recent-posts.html %}
      </ul>

      <!-- sidebar footer mascot + tagline -->
      <div class="mt-8 pt-4 flex flex-col items-center text-center gap-2" style="border-top: 2px dashed var(--rule);">
        <!-- happy face mascot listening along -->
        <svg class="doodle" width="56" height="56" viewBox="0 0 36 36" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="18" cy="16" r="11"/>
          <circle cx="14" cy="14" r="1" fill="currentColor"/>
          <circle cx="22" cy="14" r="1" fill="currentColor"/>
          <path d="M13 19 Q18 24 23 19"/>
          <path d="M18 5 L18 2 M11 6 L8 3 M25 6 L28 3"/>
        </svg>
        <span class="inline-flex items-center gap-1.5 text-sm text-gray-600">
          Happy reading!
          <!-- music notes -->
          <svg class="doodle" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 18V5l10-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="16" cy="16" r="3"/>
          </svg>
        </span>
      </div>
    </aside>

    <section
      id="contentArea"
      class="p-4 md:p-8 flex-1 overflow-auto min-w-0 order-1 md:order-2"
      style="min-height: 600px"
    >
      {{ content }}
    </section>
  </main>

  <footer class="mt-6 w-full max-w-[1400px] mx-auto">
    <div class="p-3 md:p-4 text-center">
      <p class="text-base md:text-lg inline-flex items-center gap-2 justify-center">
        © HAWATRI 2025
        <!-- heart doodle -->
        <svg class="doodle" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </p>
    </div>
  </footer>

  <script src="{{ '/assets/js/main.js' | absolute_url }}"></script>
</body>
</html>
